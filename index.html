<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e88e5">
  <title>我的旅行行程規劃器</title>
  
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22%E6%88%91%E7%9A%84%E6%97%85%E8%A1%8C%E8%A1%8C%E7%A8%8B%E8%A6%8F%E5%8A%83%E5%99%A8%22,
    %22short_name%22:%22Trip%20Planner%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%23ffffff%22,
    %22theme_color%22:%22%231e88e5%22,
    %22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/1041/1041916.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
  }">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #1e88e5;
      --accent: #42a5f5;
      --line: #29b6f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0; padding: 12px;
      background: linear-gradient(180deg, #e3f2fd, #bbdefb);
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      border-radius: 28px;
      box-shadow: 0 15px 45px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, var(--primary), #1565c0);
      color: white;
      padding: 40px 20px 32px;
      text-align: center;
    }

    .upload {
      padding: 25px;
      text-align: center;
      background: #e3f2fd;
    }

    button {
      padding: 16px 24px;
      margin: 8px 4px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-size: 1.08rem;
      font-weight: 600;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 6px 20px rgba(30,136,229,0.3);
    }
    button:hover { transform: scale(1.03); }

    /* Day Card */
    .day-card {
      background: #f8fdff;
      margin: 18px 12px;
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    }
    .day-date { font-size: 1.55rem; font-weight: 700; margin-bottom: 6px; color: #1a1a1a; }
    .day-total { font-size: 1.38rem; color: #2e7d32; font-weight: 600; }

    .route-btn {
      background: var(--accent);
      color: white;
      border-radius: 50px;
      padding: 15px 24px;
      font-size: 1.05rem;
      width: 100%;
      margin-top: 16px;
      box-shadow: 0 6px 20px rgba(66,165,245,0.35);
    }

    /* Timeline */
    .timeline { position:relative; margin:12px 25px 40px; padding-left:62px; }
    .timeline::before { 
      content:''; position:absolute; left:27px; top:0; bottom:0; 
      width:5px; background: linear-gradient(#29b6f6, #0288d1); border-radius:10px; 
    }
    .event { position:relative; margin:42px 0; }
    .event-dot { 
      width:34px; height:34px; background:var(--primary); 
      border:6px solid white; border-radius:50%; position:absolute; left:13px; z-index:2; 
      box-shadow:0 0 0 7px rgba(30,136,229,0.2); 
    }
    .event-card { 
      background:white; margin-left:68px; padding:24px; 
      border-radius:24px; box-shadow:0 8px 32px rgba(0,0,0,0.07); 
    }
    .event-card strong { 
      font-size:1.42rem; color:var(--primary); display:block; margin-bottom:8px; 
    }

    .summary {
      padding:24px; background:#e3f2fd; text-align:center; 
      font-size:1.45rem; font-weight:bold; color:#2e7d32; 
      margin:20px 12px; border-radius:24px; 
    }

    @media (max-width: 768px) {
      .day-card, .event-card { margin:14px 8px; padding:20px; }
      .timeline { padding-left:54px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>我的旅行行程規劃器</h1>
    </header>

    <div class="upload">
      <input type="file" id="fileInput" accept=".xlsx,.csv"><br><br>
      <button onclick="loadSampleData()">📋 載入馬來西亞 5 天範例</button>
      <button onclick="exportCSV()">📥 匯出 CSV</button>
      <button onclick="window.print()">📄 匯出 PDF</button>
      <button onclick="clearData()">🗑️ 清除資料</button>
    </div>

    <div id="timelineContainer"></div>
    <div id="totalSummary" class="summary" style="display:none;"></div>
  </div>

  <script>
    let trips = [];

    function extractCost(val) {
      if (!val) return 0;
      const str = String(val).toUpperCase().replace(/RM| |\$/g, '').trim();
      const matches = str.match(/\d+\.?\d*/g);
      if (!matches) return 0;
      const nums = matches.map(Number);
      return nums.length === 1 ? nums[0] : (nums[0] + nums[nums.length-1]) / 2;
    }

    function getTransportMode(transport) {
      const t = (transport || '').toLowerCase();
      if (t.includes('grab') || t.includes('車')) return 'driving';
      if (t.includes('mrt') || t.includes('ets') || t.includes('渡輪')) return 'transit';
      return 'walking';
    }

    function loadSampleData() {
      trips = [
        {"日期":"11-Apr-2026 (Sat)","時間":"8:00 -12:00","地點":"HK --> SZB","營業時間":"","$$":"","交通":"","重點":""},
        {"日期":"11-Apr-2026 (Sat)","時間":"12:00 - 14:00","地點":"去Kloe Hotel","營業時間":"","$$":"65-80","交通":"Grab（40-70 分鐘，塞車高峰）","重點":""},
        {"日期":"11-Apr-2026 (Sat)","時間":"14:15 - 15:15","地點":"好家婆 Best Ah Ma Cafe","營業時間":"每日 08:30–18:30","$$":"8-12","交通":"Grab（5-15 分鐘）","重點":"蛋糕、娘惹菜、咖啡"},
        {"日期":"11-Apr-2026 (Sat)","時間":"15:30 - 16:15","地點":"中央市場（Pasar Seni）","營業時間":"10:00-22:00","$$":"8-12","交通":"Grab（5-15 分鐘）","重點":"買手信"},
        {"日期":"11-Apr-2026 (Sat)","時間":"21:00 - 22:00","地點":"KLCC 雙子塔 + Suria KLCC","營業時間":"10:00–22:00","$$":"10-15","交通":"Grab","重點":"音樂噴泉"},
        {"日期":"12-Apr-2026 (Sun)","時間":"9:30 - 11:00","地點":"Putrajaya 粉紅清真寺","營業時間":"9:00-18:00","$$":"65-85","交通":"Grab（40-70 分）","重點":"打卡"},
        {"日期":"12-Apr-2026 (Sun)","時間":"11:00 - 11:45","地點":"Medan Imbi 肉骨茶","營業時間":"8:30-15:30","$$":"35-50","交通":"Grab","重點":"阿喜肉骨茶"},
        {"日期":"12-Apr-2026 (Sun)","時間":"15:00 - 17:00","地點":"KLCC + Madam Kwan’s","營業時間":"08:00–22:00","$$":"10-18","交通":"Grab","重點":"娘惹菜"}
      ];
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
      renderAll();
      alert("✅ 已載入馬來西亞 5 天範例行程！");
    }

    function renderAll() {
      renderTimeline();
      renderSummary();
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = '';

      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });

      Object.keys(grouped).sort().forEach(date => {
        const dayTrips = grouped[date];
        const dayTotal = dayTrips.reduce((sum, r) => sum + extractCost(r['$$']), 0);

        let waypoints = dayTrips.map(r => encodeURIComponent(r['地點'] || '')).filter(Boolean).join('|');
        const dayMapUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(dayTrips[0]?.['地點'] || '')}&destination=${encodeURIComponent(dayTrips[dayTrips.length-1]?.['地點'] || '')}&waypoints=${waypoints}&travelmode=driving`;

        let html = `
          <div class="day-card">
            <div class="day-date">${date}</div>
            <div class="day-total">小計 RM ${dayTotal.toFixed(0)}</div>
            <button class="route-btn" onclick="window.open('${dayMapUrl}','_blank')">
              📍 查看當天完整路線
            </button>
          </div>
          <div class="timeline">`;

        let prevLoc = '';

        dayTrips.forEach(r => {
          const costNum = extractCost(r['$$']);
          const originalCost = r['$$'] || '—';
          const currentLoc = r['地點'] || '';
          const mode = getTransportMode(r['交通']);
          const encodedCurrent = encodeURIComponent(currentLoc);

          let mapUrl = prevLoc 
            ? `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(prevLoc)}&destination=${encodedCurrent}&travelmode=${mode}`
            : `https://www.google.com/maps/search/?api=1&query=${encodedCurrent}&travelmode=${mode}`;

          html += `
            <div class="event">
              <div class="event-dot"></div>
              <div class="event-card">
                <strong>${r['時間'] || ''}</strong>
                <b style="font-size:1.32rem;">${currentLoc}</b><br>
                <small>
                  營業時間：${r['營業時間'] || '—'}<br>
                  費用：${originalCost} （計算用 RM ${costNum.toFixed(0)}）<br>
                  交通：${r['交通'] || '—'}<br>
                  重點：${r['重點'] || ''}
                </small>
                <button class="nav-btn" onclick="window.open('${mapUrl}','_blank')">🗺️ 從上一個地點導航</button>
              </div>
            </div>`;

          prevLoc = currentLoc;
        });
        html += `</div>`;
        container.innerHTML += html;
      });
    }

    function renderSummary() {
      const total = trips.reduce((sum, r) => sum + extractCost(r['$$']), 0);
      const el = document.getElementById('totalSummary');
      el.innerHTML = `全行程總預估費用：RM ${total.toFixed(0)}`;
      el.style.display = 'block';
    }

    function exportCSV() {
      if (trips.length === 0) return alert('沒有資料');
      let csv = '日期,時間,地點,營業時間,$$,交通,重點\n';
      trips.forEach(r => {
        csv += `"${r['日期']||''}","${r['時間']||''}","${r['地點']
