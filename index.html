<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇲🇾 我的馬來西亞 5 天行程</title>
  <style>
    :root { --primary: #d32f2f; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 15px; background: #f5f5f5; line-height: 1.5; }
    .container { max-width: 960px; margin: auto; background: white; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: var(--primary); color: white; padding: 20px; text-align: center; }
    .upload-area { padding: 20px; text-align: center; background: #fff3e0; }
    button { padding: 10px 18px; margin: 5px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #b71c1c; }
    .day-header { background: #e8f5e9; padding: 12px 20px; margin: 25px 20px 10px; font-size: 1.4rem; font-weight: bold; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .timeline { position: relative; max-width: 900px; margin: 20px auto; padding: 0 20px; }
    .timeline::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 6px; background: #ff9800; transform: translateX(-50%); }
    .event { position: relative; margin: 40px 0; display: flex; align-items: center; }
    .event:nth-child(odd) { flex-direction: row; }
    .event:nth-child(even) { flex-direction: row-reverse; }
    .event-dot { width: 24px; height: 24px; background: var(--primary); border: 4px solid white; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 2; box-shadow: 0 0 0 5px #ffebee; }
    .event-card { background: white; border-radius: 12px; padding: 18px; width: 45%; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: relative; }
    .event-card strong { font-size: 1.2rem; color: #d32f2f; }
    .event-card small { display: block; margin-top: 8px; color: #555; }
    .nav-btn { margin-top: 10px; background: #4caf50; font-size: 0.95rem; }
    .summary { padding: 20px; background: #f0f4f8; text-align: center; font-size: 1.3rem; font-weight: bold; color: #2e7d32; }
    @media (max-width: 768px) {
      .timeline::before { left: 30px; }
      .event { flex-direction: column !important; align-items: flex-start; }
      .event-dot { left: 30px; }
      .event-card { width: calc(100% - 70px); margin-left: 55px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🇲🇾 我的馬來西亞 5 天詳細行程</h1>
      <p>完全離線時間軸 • 自動費用統計 • 點擊導航</p>
    </header>

    <div class="upload-area">
      <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px;">
      <button onclick="exportCSV()">匯出 CSV</button>
      <button onclick="clearData()">清除資料</button>
    </div>

    <div id="timelineContainer"></div>

    <div id="totalSummary" class="summary" style="display:none;"></div>
  </div>

  <script>
    let trips = [];

    const csvInput = document.getElementById('csvFile');
    csvInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        trips = parseCSV(ev.target.result);
        saveToLocalStorage();
        renderAll();
      };
      reader.readAsText(file);
    });

    function parseCSV(csv) {
      const lines = csv.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const values = line.split(',');
        const obj = {};
        headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : '');
        return obj;
      });
    }

    function renderAll() {
      renderTimeline();
      renderTotalSummary();
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = '';

      const days = [...new Set(trips.map(t => t.Day))].sort((a,b)=>a-b);

      days.forEach(day => {
        const dayTrips = trips.filter(t => t.Day == day)
          .sort((a,b) => a.Start_Time.localeCompare(b.Start_Time));

        let dayHTML = `<div class="day-header">Day ${day} <span style="font-size:1rem;font-weight:normal;">小計 RM ${dayTrips.reduce((sum,t)=>sum+(parseFloat(t.Est_Cost_RM)||0),0).toFixed(0)}</span></div>`;
        dayHTML += `<div class="timeline">`;

        let prevLat = null, prevLng = null;

        dayTrips.forEach((t, i) => {
          const cost = parseFloat(t.Est_Cost_RM) || 0;
          const lat = parseFloat(t.Lat);
          const lng = parseFloat(t.Lng);
          let navHTML = '';

          if (lat && lng) {
            const destination = `${lat},${lng}`;
            const origin = prevLat && prevLng ? `${prevLat},${prevLng}` : '';
            const mode = (t.Transport || '').toLowerCase().includes('grab') || (t.Transport || '').toLowerCase().includes('car') ? 'driving' : 'walking';
            const url = origin 
              ? `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=${mode}`
              : `https://www.google.com/maps/dir/?api=1&destination=${destination}&travelmode=${mode}`;
            navHTML = `<button class="nav-btn" onclick="window.open('${url}','_blank')">🗺️ Google 導航</button>`;
          }
          prevLat = lat; prevLng = lng;

          dayHTML += `
            <div class="event">
              <div class="event-dot"></div>
              <div class="event-card">
                <strong>${t.Start_Time} - ${t.End_Time}</strong><br>
                ${t.Activity || t.Location}<br>
                <small>交通：${t.Transport || '—'}　|　費用：RM ${cost}　|　${t.Notes || ''}</small>
                ${navHTML}
              </div>
            </div>`;
        });
        dayHTML += `</div>`;
        container.innerHTML += dayHTML;
      });
    }

    function renderTotalSummary() {
      if (trips.length === 0) {
        document.getElementById('totalSummary').style.display = 'none';
        return;
      }
      const total = trips.reduce((sum, t) => sum + (parseFloat(t.Est_Cost_RM) || 0), 0).toFixed(0);
      document.getElementById('totalSummary').innerHTML = `全行程總預估費用：RM ${total}`;
      document.getElementById('totalSummary').style.display = 'block';
    }

    function saveToLocalStorage() {
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('malaysiaTrips');
      if (saved) {
        trips = JSON.parse(saved);
        renderAll();
      }
    }

    function exportCSV() {
      if (trips.length === 0) return alert('沒有資料');
      let csv = 'Day,Start_Time,End_Time,Activity,Location,Transport,Est_Duration_min,Est_Cost_RM,Notes,Lat,Lng\n';
      trips.forEach(t => {
        csv += `${t.Day||''},${t.Start_Time||''},${t.End_Time||''},${t.Activity||''},${t.Location||''},${t.Transport||''},${t.Est_Duration_min||''},${t.Est_Cost_RM||''},${t.Notes||''},${t.Lat||''},${t.Lng||''}\n`;
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'malaysia-5days-trip.csv';
      a.click();
    }

    function clearData() {
      if (confirm('確定清除所有資料？')) {
        localStorage.removeItem('malaysiaTrips');
        trips = [];
        document.getElementById('timelineContainer').innerHTML = '';
        document.getElementById('totalSummary').style.display = 'none';
      }
    }

    window.onload = loadFromLocalStorage;
  </script>
</body>
</html>
