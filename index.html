<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇲🇾 我的馬來西亞行程 - Day 2</title>
  <style>
    :root { --primary: #d32f2f; }
    body { font-family: system-ui, -apple-system, sans-serif; margin:0; padding:15px; background:#f5f5f5; line-height:1.6; }
    .container { max-width:960px; margin:auto; background:white; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,0.1); overflow:hidden; }
    header { background:var(--primary); color:white; padding:25px; text-align:center; }
    .upload { padding:20px; text-align:center; background:#fff3e0; }
    button { padding:10px 18px; margin:5px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; }
    button:hover { background:#b71c1c; }
    .day-header { background:#e8f5e9; padding:15px 20px; margin:20px; font-size:1.5rem; font-weight:bold; border-radius:12px; }
    .timeline { position:relative; margin:20px; padding-left:50px; }
    .timeline::before { content:''; position:absolute; left:20px; top:0; bottom:0; width:6px; background:#ff9800; }
    .event { position:relative; margin:35px 0; }
    .event-dot { width:22px; height:22px; background:var(--primary); border:4px solid white; border-radius:50%; position:absolute; left:9px; z-index:2; }
    .event-card { background:white; margin-left:50px; padding:18px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.08); }
    .event-card strong { color:#d32f2f; font-size:1.25rem; }
    .summary { padding:20px; background:#f0f4f8; text-align:center; font-size:1.35rem; font-weight:bold; color:#2e7d32; margin:20px; border-radius:12px; }
    .error { color:#d32f2f; background:#ffebee; padding:15px; border-radius:8px; margin:20px; }
    @media (max-width:768px) { .event-card { margin-left:45px; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🇲🇾 我的馬來西亞行程</h1>
      <p>已適配你的 CSV 格式 • 垂直時間軸 • 費用統計</p>
    </header>

    <div class="upload">
      <input type="file" id="csvFile" accept=".csv"><br><br>
      <button onclick="exportCSV()">📥 匯出 CSV</button>
      <button onclick="clearData()">🗑️ 清除資料</button>
    </div>

    <div id="timelineContainer"></div>
    <div id="totalSummary" class="summary" style="display:none;"></div>
  </div>

  <script>
    let trips = [];

    document.getElementById('csvFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          trips = parseMyCSV(ev.target.result);
          localStorage.setItem('myTripData', JSON.stringify(trips));
          renderTimeline();
        } catch(err) {
          document.getElementById('timelineContainer').innerHTML = `<div class="error">CSV 讀取失敗，請確認格式正確</div>`;
        }
      };
      reader.readAsText(file);
    });

    function parseMyCSV(csv) {
      const lines = csv.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // 處理引號內逗號
        const obj = {};
        headers.forEach((h, i) => obj[h] = (values[i] || '').replace(/^"|"$/g, '').trim());
        return obj;
      });
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = `<div class="day-header">Day 2 - 怡保出發日（Putrajaya → KLCC → 怡保）</div><div class="timeline">`;

      trips.forEach(t => {
        const time = t['時間'] || '';
        const activity = t['地點／活動'] || '';
        const transport = t['交通方式（時間＋塞車緩衝＋費用）'] || '';
        const open = t['開放時間'] || '';
        const note = t['備註（食／打卡）'] || '';

        container.innerHTML += `
          <div class="event">
            <div class="event-dot"></div>
            <div class="event-card">
              <strong>${time}</strong><br>
              ${activity}<br>
              <small>交通：${transport}<br>
                     開放時間：${open}<br>
                     備註：${note}</small>
            </div>
          </div>`;
      });

      container.innerHTML += `</div>`;
      renderSummary();
    }

    function renderSummary() {
      // 簡單顯示總筆數（你這份 CSV 沒有明確費用欄位，可之後再加）
      document.getElementById('totalSummary').innerHTML = `共 ${trips.length} 個行程項目`;
      document.getElementById('totalSummary').style.display = 'block';
    }

    function exportCSV() {
      if (trips.length === 0) return alert('沒有資料');
      let csv = '時間,地點／活動,交通方式（時間＋塞車緩衝＋費用）,開放時間,備註（食／打卡）\n';
      trips.forEach(t => {
        csv += `"${t['時間']||''}","${t['地點／活動']||''}","${t['交通方式（時間＋塞車緩衝＋費用）']||''}","${t['開放時間']||''}","${t['備註（食／打卡）']||''}"\n`;
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'my-malaysia-day2.csv';
      a.click();
    }

    function clearData() {
      if (confirm('清除所有資料？')) {
        localStorage.removeItem('myTripData');
        trips = [];
        document.getElementById('timelineContainer').innerHTML = '';
        document.getElementById('totalSummary').style.display = 'none';
      }
    }

    // 自動載入上次資料
    window.onload = () => {
      const saved = localStorage.getItem('myTripData');
      if (saved) {
        trips = JSON.parse(saved);
        renderTimeline();
      }
    };
  </script>
</body>
</html>
