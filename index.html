<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d32f2f">
  <title>我的旅行行程規劃器</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22%E6%88%91%E7%9A%84%E6%97%85%E8%A1%8C%E8%A1%8C%E7%A8%8B%E8%A6%8F%E5%8A%83%E5%99%A8%22,
    %22short_name%22:%22Trip%20Planner%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%23ffffff%22,
    %22theme_color%22:%22%23d32f2f%22,
    %22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/1041/1041916.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
  }">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root { --primary: #d32f2f; --bg: #f8f9fa; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      margin:0; padding:12px; background:var(--bg); line-height:1.6; 
    }
    .container { 
      max-width:1000px; margin:auto; background:white; 
      border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.08); 
      overflow:hidden; 
    }
    header { 
      background:linear-gradient(135deg, var(--primary), #e53935); 
      color:white; padding:30px 20px; text-align:center; 
    }
    .upload { padding:25px; text-align:center; background:#fff3e0; }
    button { 
      padding:16px 24px; margin:8px 4px; background:var(--primary); 
      color:white; border:none; border-radius:16px; cursor:pointer; 
      font-size:1.1rem; font-weight:600; width:100%; max-width:320px; 
      box-shadow:0 4px 12px rgba(211,47,47,0.3);
    }
    button:hover { background:#b71c1c; transform:scale(1.03); }
    .nav-btn { background:#4caf50; font-size:1rem; }
    .nav-btn:hover { background:#388e3c; }
    .day-header { 
      background:#e8f5e9; padding:20px; margin:20px; 
      font-size:1.4rem; font-weight:600; border-radius:20px; 
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; 
    }
    .timeline { position:relative; margin:20px 25px; padding-left:55px; }
    .timeline::before { content:''; position:absolute; left:24px; top:0; bottom:0; width:5px; background:#ff9800; border-radius:10px; }
    .event { position:relative; margin:45px 0; }
    .event-dot { 
      width:30px; height:30px; background:var(--primary); 
      border:6px solid white; border-radius:50%; 
      position:absolute; left:12px; z-index:2; box-shadow:0 0 0 6px #ffebee; 
    }
    .event-card { 
      background:white; margin-left:60px; padding:24px; 
      border-radius:20px; box-shadow:0 6px 20px rgba(0,0,0,0.07); 
    }
    .event-card strong { color:var(--primary); font-size:1.35rem; }
    .summary { 
      padding:24px; background:#f0f4f8; text-align:center; 
      font-size:1.45rem; font-weight:bold; color:#2e7d32; 
      margin:20px; border-radius:20px; 
    }
    small { display:block; margin-top:12px; color:#555; line-height:1.5; }
    .error { color:#d32f2f; background:#ffebee; padding:15px; border-radius:12px; margin:20px; }

    /* iOS 友好行動版優化 */
    @media (max-width: 768px) {
      body { padding:8px; font-size:1.05rem; }
      .event-card { margin-left:48px; padding:20px; border-radius:18px; }
      .timeline { padding-left:48px; }
      button { font-size:1.15rem; padding:18px 24px; }
    }

    /* PDF 列印優化 */
    @media print {
      body { background:white; padding:0; }
      .container { box-shadow:none; border-radius:0; }
      .upload, button:not(.print-btn) { display:none !important; }
      .event-card { box-shadow:none; border:1px solid #ddd; margin-left:0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>我的旅行行程規劃器</h1>
      <p>Excel 匯入 • Google 導航 • PDF 匯出</p>
      <button onclick="installPWA()" style="background:#333;color:white;max-width:100%;">📲 安裝到主畫面 (PWA)</button>
    </header>

    <div class="upload">
      <input type="file" id="fileInput" accept=".xlsx,.csv"><br><br>
      <button onclick="exportCSV()">📥 匯出 CSV</button>
      <button onclick="window.print()" class="print-btn">📄 匯出 PDF（列印）</button>
      <button onclick="clearData()">🗑️ 清除資料</button>
    </div>

    <div id="timelineContainer"></div>
    <div id="totalSummary" class="summary" style="display:none;"></div>
  </div>

  <script>
    let trips = [];

    function extractCost(val) {
      if (!val) return 0;
      const str = String(val).toUpperCase().replace(/RM| |\$/g, '').trim();
      const matches = str.match(/\d+\.?\d*/g);
      if (!matches) return 0;
      const nums = matches.map(Number);
      return nums.length === 1 ? nums[0] : (nums[0] + nums[nums.length-1]) / 2;
    }

    function getTransportMode(transport) {
      const t = (transport || '').toLowerCase();
      if (t.includes('grab') || t.includes('車') || t.includes('taxi')) return 'driving';
      if (t.includes('mrt') || t.includes('ets') || t.includes('渡輪') || t.includes('火車')) return 'transit';
      return 'walking';
    }

    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          if (file.name.endsWith('.xlsx')) {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            let raw = XLSX.utils.sheet_to_json(sheet);

            let currentDate = '';
            raw.forEach(row => {
              if (row['日期'] && String(row['日期']).trim() !== '') currentDate = String(row['日期']).trim();
              else if (currentDate) row['日期'] = currentDate;
            });

            trips = raw.filter(r => r['時間'] || r['地點']);
          } else {
            trips = parseCSV(ev.target.result);
          }
          localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
          renderAll();
        } catch(err) {
          document.getElementById('timelineContainer').innerHTML = `<div class="error">讀取失敗，請確認檔案格式</div>`;
        }
      };
      reader.readAsArrayBuffer ? reader.readAsArrayBuffer(file) : reader.readAsText(file);
    });

    function parseCSV(csv) {
      const lines = csv.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const obj = {};
        headers.forEach((h,i) => obj[h] = (values[i] || '').replace(/^"|"$/g,'').trim());
        return obj;
      });
    }

    function renderAll() {
      renderTimeline();
      renderSummary();
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = '';

      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });

      Object.keys(grouped).sort().forEach(date => {
        const dayTrips = grouped[date];
        const dayTotal = dayTrips.reduce((sum, r) => sum + extractCost(r['$$']), 0);

        let waypoints = dayTrips.map(r => encodeURIComponent(r['地點'] || '')).filter(Boolean).join('|');
        const dayMapUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(dayTrips[0]?.['地點'] || '')}&destination=${encodeURIComponent(dayTrips[dayTrips.length-1]?.['地點'] || '')}&waypoints=${waypoints}&travelmode=driving`;

        let html = `<div class="day-header">${date} <span>小計 RM ${dayTotal.toFixed(0)}</span>
          <button class="nav-btn" onclick="window.open('${dayMapUrl}','_blank')">📍 查看當天完整路線</button>
        </div>`;
        html += `<div class="timeline">`;

        let prevLoc = '';

        dayTrips.forEach(r => {
          const costNum = extractCost(r['$$']);
          const originalCost = r['$$'] || '—';
          const currentLoc = r['地點'] || '';
          const mode = getTransportMode(r['交通']);
          const encodedCurrent = encodeURIComponent(currentLoc);

          let mapUrl = prevLoc 
            ? `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(prevLoc)}&destination=${encodedCurrent}&travelmode=${mode}`
            : `https://www.google.com/maps/search/?api=1&query=${encodedCurrent}&travelmode=${mode}`;

          html += `
            <div class="event">
              <div class="event-dot"></div>
              <div class="event-card">
                <strong>${r['時間'] || ''}</strong><br>
                <b>${currentLoc}</b><br>
                <small>
                  營業時間：${r['營業時間'] || '—'}<br>
                  費用：${originalCost} （計算用 RM ${costNum.toFixed(0)}）<br>
                  交通：${r['交通'] || '—'}<br>
                  重點：${r['重點'] || ''}
                </small>
                <button class="nav-btn" onclick="window.open('${mapUrl}','_blank')">🗺️ 從上一個地點導航</button>
              </div>
            </div>`;

          prevLoc = currentLoc;
        });
        html += `</div>`;
        container.innerHTML += html;
      });
    }

    function renderSummary() {
      const total = trips.reduce((sum, r) => sum + extractCost(r['$$']), 0);
      const el = document.getElementById('totalSummary');
      el.innerHTML = `全行程總預估費用：RM ${total.toFixed(0)}`;
      el.style.display = 'block';
    }

    function exportCSV() {
      if (trips.length === 0) return alert('沒有資料');
      let csv = '日期,時間,地點,營業時間,$$,交通,重點\n';
      trips.forEach(r => {
        csv += `"${r['日期']||''}","${r['時間']||''}","${r['地點']||''}","${r['營業時間']||''}","${r['$$']||''}","${r['交通']||''}","${r['重點']||''}"\n`;
      });
      const blob = new Blob([csv], {type:'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'My-Trip.csv';
      a.click();
    }

    function clearData() {
      if (confirm('確定清除所有資料？')) {
        localStorage.removeItem('malaysiaTrips');
        trips = [];
        document.getElementById('timelineContainer').innerHTML = '';
        document.getElementById('totalSummary').style.display = 'none';
      }
    }

    function installPWA() {
      alert("📲 安裝方式：\n\niOS Safari：點擊下方「分享」→「加入主畫面」\nAndroid Chrome：右上角選單 →「安裝應用程式」");
    }

    window.onload = () => {
      const saved = localStorage.getItem('malaysiaTrips');
      if (saved) {
        trips = JSON.parse(saved);
        renderAll();
      }
    };
  </script>
</body>
</html>
