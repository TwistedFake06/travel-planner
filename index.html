<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e88e5">
  <title>我的旅行行程</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #1e88e5;
      --accent: #42a5f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #333;
      height: 100vh;
      overflow: hidden;           /* 重要：body 保持 hidden */
      display: flex;
      flex-direction: column;
    }

    /* Header 永遠固定在最上方 */
    .app-header {
      background: linear-gradient(135deg, #1e88e5, #1565c0);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      flex-shrink: 0;             /* 防止被壓縮 */
      z-index: 100;
    }
    .app-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* 關鍵修正：可滑動的主要內容區 */
    .scrollable-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;   /* iOS Safari 順暢滑動 */
      padding-bottom: 20px;
      background: #f0f4f8;
    }

    /* 上傳按鈕區 */
    .upload {
      padding: 16px;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid #eee;
    }
    button {
      border: none;
      border-radius: 50px;
      padding: 14px 20px;
      font-size: 1.02rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, #1e88e5, #42a5f5); }
    .btn-success { background: linear-gradient(135deg, #66bb6a, #43a047); }
    .btn-danger  { background: linear-gradient(135deg, #ef5350, #e53935); }

    /* Day Tabs */
    .day-tabs {
      display: flex;
      overflow-x: auto;
      background: white;
      padding: 12px 8px;
      gap: 8px;
      border-bottom: 1px solid #eee;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .day-tab {
      flex: 0 0 auto;
      padding: 10px 20px;
      background: #f5f5f5;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .day-tab.active {
      background: var(--primary);
      color: white;
    }

    /* Timeline */
    .timeline-container {
      padding: 12px 16px;
    }
    .day-section { margin-bottom: 32px; }
    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0 10px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #1e88e5;
    }
    .day-total { margin-left: auto; color: #2e7d32; font-size: 1.05rem; }

    .add-event-btn {
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: white;
      border-radius: 50px;
      padding: 12px;
      font-size: 1rem;
      width: 100%;
      margin-bottom: 20px;
    }

    /* Event Card */
    .event {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      position: relative;
    }
    .event::before {
      content: '';
      position: absolute;
      left: 19px;
      top: 38px;
      bottom: -20px;
      width: 3px;
      background: linear-gradient(#1e88e5, #42a5f5);
    }
    .event:last-child::before { display: none; }

    .time-dot { width: 42px; text-align: center; flex-shrink: 0; }
    .time { font-size: 0.95rem; font-weight: 700; color: #666; }
    .dot {
      width: 38px; height: 38px;
      background: white;
      border: 4px solid var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      margin: 6px auto;
      box-shadow: 0 4px 12px rgba(30,136,229,0.25);
    }

    .event-card {
      flex: 1;
      background: white;
      border-radius: 18px;
      padding: 18px 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      position: relative;
    }
    .edit-icon {
      position: absolute;
      top: 14px; right: 14px;
      font-size: 1.4rem;
      cursor: pointer;
      color: #999;
    }
    .event-card h3 { margin: 0 0 8px; font-size: 1.22rem; font-weight: 700; }
    .event-card small { color: #555; line-height: 1.5; }
    .transport {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0f7ff;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
    }
    .nav-btn {
      margin-top: 14px;
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: white;
      border-radius: 50px;
      padding: 12px 24px;
      width: 100%;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      width: 92%;
      max-width: 380px;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { margin: 0 0 18px; color: var(--primary); text-align: center; }
    .modal label { display: block; margin: 14px 0 5px; color: #555; }
    .modal input, .modal textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
    }
    .modal-buttons { margin-top: 24px; display: flex; gap: 10px; }
    .modal-buttons button {
      flex: 1;
      padding: 13px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 50px;
      border: none;
    }
    .cancel-btn { background: #9e9e9e; color: white; }
    .delete-btn { background: #ef5350; color: white; }
    .save-btn { background: var(--primary); color: white; }

    a.link { color: #1e88e5; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="app-header">
    <div onclick="history.back()" style="cursor:pointer;">←</div>
    <h1>我的旅行行程</h1>
    <div style="font-size:1.4rem;">❔ ✏️ 🔗</div>
  </div>

  <!-- 這層是解決 Safari 無法滑到最上面的關鍵 -->
  <div class="scrollable-content">
    <div class="upload">
      <input type="file" id="fileInput" accept=".xlsx,.csv" style="display:none;">
      <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📤 上傳 Excel / CSV</button>
      <button class="btn-primary" onclick="loadSampleData()">📋 載入馬來西亞 5 天範例</button>
      <button class="btn-primary" onclick="exportCSV()">📥 匯出 CSV</button>
      <button class="btn-primary" onclick="window.print()">📄 列印 / 匯出 PDF</button>
      <button class="btn-danger" onclick="clearData()">🗑️ 清除所有資料</button>
    </div>

    <div id="dayTabs" class="day-tabs"></div>
    <div id="timelineContainer" class="timeline-container"></div>
  </div>

  <!-- 編輯 Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2>✏️ 編輯行程</h2>
      <label>日期</label><input type="text" id="edit-date">
      <label>時間</label><input type="text" id="edit-time">
      <label>地點</label><input type="text" id="edit-location">
      <label>營業時間</label><input type="text" id="edit-hours">
      <label>費用 ($$)</label><input type="text" id="edit-cost">
      <label>交通方式</label><input type="text" id="edit-transport">
      <label>重點 / 備註</label><textarea id="edit-note" rows="3"></textarea>
      <div class="modal-buttons">
        <button onclick="hideModal()" class="cancel-btn">取消</button>
        <button onclick="deleteCurrentEvent()" class="delete-btn">🗑️ 刪除</button>
        <button onclick="saveEdit()" class="save-btn">💾 儲存</button>
      </div>
    </div>
  </div>

  <script>
    // ...（這裡的 JavaScript 與上一版完全相同，我為了避免重複就不貼了）
    // 請直接使用你之前最後一版中從 <script> 到 </script> 的全部內容
    // 如果你要我把完整 JS 也一起貼上，請說「給我完整版含 JS」，我立刻補上。
  </script>
</body>
</html>
