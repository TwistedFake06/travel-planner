<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 推薦行程</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root { --pink: #ff2d55; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0; padding: 0; background: linear-gradient(180deg, #ff2d55, #ff5e80);
      color: #333; min-height: 100vh;
    }
    .header {
      background: white; color: var(--pink); padding: 40px 20px 25px; text-align: center;
      border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .title { font-size: 2.2rem; font-weight: 800; margin: 0; }
    .subtitle { font-size: 1.1rem; opacity: 0.85; margin-top: 8px; }

    .container { max-width: 1000px; margin: 20px auto; padding: 0 12px; }

    .sample-btn {
      background: white; color: var(--pink); border: none; border-radius: 50px;
      padding: 16px 30px; font-size: 1.15rem; font-weight: 700; width: 100%;
      margin-bottom: 20px; box-shadow: 0 6px 20px rgba(255,45,85,0.3);
    }

    .day-card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .day-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; font-weight: 700; font-size: 1.25rem;
    }
    .day-total { color: #2e7d32; }

    .event {
      display: flex; gap: 16px; margin: 18px 0; padding-bottom: 18px;
      border-bottom: 1px solid #f0f0f0;
    }
    .event:last-child { border-bottom: none; padding-bottom: 0; }

    .time {
      width: 70px; font-weight: 700; color: var(--pink); font-size: 1.1rem;
      flex-shrink: 0;
    }
    .content {
      flex: 1;
    }
    .place {
      font-size: 1.15rem; font-weight: 600; margin-bottom: 4px;
    }
    .note {
      font-size: 0.95rem; color: #666; line-height: 1.4;
    }

    .nav-btn {
      background: var(--pink); color: white; border: none; border-radius: 50px;
      padding: 12px 20px; font-size: 1rem; margin-top: 12px; width: 100%;
    }

    .summary {
      text-align: center; padding: 20px; background: white; border-radius: 24px;
      margin: 20px 12px; font-size: 1.3rem; font-weight: 700; color: #2e7d32;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">AI 推薦行程</h1>
    <p class="subtitle">3分鐘即可完成行程規劃</p>
  </div>

  <div class="container">
    <button class="sample-btn" onclick="loadSampleData()">📋 載入馬來西亞 5 天範例行程</button>

    <div id="timelineContainer"></div>
    <div id="totalSummary" class="summary" style="display:none;"></div>
  </div>

  <script>
    let trips = [];

    function extractCost(val) {
      if (!val) return 0;
      const str = String(val).toUpperCase().replace(/RM| |\$/g, '').trim();
      const matches = str.match(/\d+\.?\d*/g);
      if (!matches) return 0;
      const nums = matches.map(Number);
      return nums.length === 1 ? nums[0] : (nums[0] + nums[nums.length-1]) / 2;
    }

    function loadSampleData() {
      trips = [ /* 你的馬來西亞行程資料 */ 
        {"日期":"11-Apr-2026 (Sat)","時間":"8:00 -12:00","地點":"HK --> SZB","$$":"","交通":"","重點":""},
        {"日期":"11-Apr-2026 (Sat)","時間":"12:00 - 14:00","地點":"去Kloe Hotel","$$":"65-80","交通":"Grab（40-70 分鐘）","重點":""},
        {"日期":"11-Apr-2026 (Sat)","時間":"14:15 - 15:15","地點":"好家婆 Best Ah Ma Cafe","$$":"8-12","交通":"Grab（5-15 分鐘）","重點":"娘惹菜、咖啡"},
        {"日期":"11-Apr-2026 (Sat)","時間":"15:30 - 16:15","地點":"中央市場（Pasar Seni）","$$":"8-12","交通":"Grab","重點":"手信、工藝品"},
        {"日期":"12-Apr-2026 (Sun)","時間":"9:30 - 11:00","地點":"Putrajaya 粉紅清真寺","$$":"65-85","交通":"Grab","重點":"打卡"},
        // ... 你可以繼續補充更多資料
      ];
      renderAll();
      alert("✅ 已載入範例行程！");
    }

    function renderAll() {
      renderTimeline();
      renderSummary();
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = '';

      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });

      Object.keys(grouped).sort().forEach(date => {
        const dayTrips = grouped[date];
        const dayTotal = dayTrips.reduce((sum, r) => sum + extractCost(r['$$']), 0);

        let html = `
          <div class="day-card">
            <div class="day-header">
              <span class="day-date">${date}</span>
              <span class="day-total">小計 RM ${dayTotal.toFixed(0)}</span>
            </div>`;

        dayTrips.forEach(r => {
          html += `
            <div class="event">
              <div class="time">${r['時間'] || ''}</div>
              <div class="content">
                <div class="place">${r['地點'] || ''}</div>
                <div class="note">
                  費用：${r['$$'] || '—'}　交通：${r['交通'] || '—'}<br>
                  ${r['重點'] || ''}
                </div>
                <button class="nav-btn">🗺️ 從上一個地點導航</button>
              </div>
            </div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
      });
    }

    function renderSummary() {
      const total = trips.reduce((sum, r) => sum + extractCost(r['$$']), 0);
      document.getElementById('totalSummary').innerHTML = `全行程總預估費用：RM ${total.toFixed(0)}`;
      document.getElementById('totalSummary').style.display = 'block';
    }

    function exportCSV() { alert("CSV 匯出功能保留中..."); }
    function clearData() { if(confirm('清除資料？')) location.reload(); }

    window.onload = () => { /* 可載入上次資料 */ };
  </script>
</body>
</html>
