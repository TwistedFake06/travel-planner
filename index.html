<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e91e63">
  <title>我的旅行行程</title>
  
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22%E6%88%91%E7%9A%84%E6%97%85%E8%A1%8C%E8%A1%8C%E7%A8%8B%E8%A6%8F%E5%8A%83%E5%99%A8%22,
    %22short_name%22:%22Trip%20Planner%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%23ffffff%22,
    %22theme_color%22:%22%23e91e63%22,
    %22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/1041/1041916.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
  }">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #1e88e5;
      --accent: #42a5f5;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      box-shadow: 0 0 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* App Header */
    .app-header {
      background: linear-gradient(135deg, #e91e63, #ff4081);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
    }

    /* Upload */
    .upload {
      padding: 16px;
      background: #fff;
      text-align: center;
      border-bottom: 1px solid #eee;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 24px;
      margin: 6px 4px;
      border-radius: 50px;
      font-size: 1.02rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }

    /* Day Tabs */
    .day-tabs {
      display: flex;
      overflow-x: auto;
      background: white;
      padding: 12px 8px;
      gap: 8px;
      border-bottom: 1px solid #eee;
      scrollbar-width: none;
    }
    .day-tab {
      flex: 0 0 auto;
      padding: 10px 20px;
      background: #f8f8f8;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.3s;
    }
    .day-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(233,30,99,0.3);
    }

    /* Timeline */
    .timeline-container {
      padding: 0 16px 80px;
    }
    .day-section {
      margin-bottom: 40px;
    }
    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 12px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #222;
    }
    .day-total {
      margin-left: auto;
      color: #2e7d32;
      font-size: 1.05rem;
    }
    .add-event-btn {
      background: #66bb6a;
      color: white;
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 0.95rem;
      margin: 0 16px 20px;
      width: calc(100% - 32px);
    }

    .event {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      position: relative;
    }
    .event::before {
      content: '';
      position: absolute;
      left: 19px;
      top: 38px;
      bottom: -20px;
      width: 3px;
      background: linear-gradient(#ff4081, #e91e63);
      z-index: 0;
    }
    .event:last-child::before { display: none; }

    .time-dot {
      width: 42px;
      text-align: center;
      flex-shrink: 0;
      z-index: 1;
    }
    .time {
      font-size: 0.95rem;
      font-weight: 700;
      color: #666;
      display: block;
      min-height: 24px;
    }
    .dot {
      width: 38px;
      height: 38px;
      background: white;
      border: 4px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin: 6px auto;
      box-shadow: 0 4px 12px rgba(233,30,99,0.25);
    }

    .event-card {
      flex: 1;
      background: white;
      border-radius: 20px;
      padding: 18px 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      position: relative;
    }
    .edit-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 1.4rem;
      cursor: pointer;
      color: #999;
      z-index: 2;
    }
    .event-card h3 {
      margin: 0 0 6px;
      font-size: 1.22rem;
      font-weight: 700;
    }
    .event-card small {
      color: #666;
      line-height: 1.5;
      display: block;
    }
    .transport {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0f0f0;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
    }
    .nav-btn {
      margin-top: 14px;
      background: #66bb6a;
      color: white;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 1rem;
      width: 100%;
    }

    /* ========== 優化後的 Modal（變小、更緊湊） ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.65);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 380px;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal h2 {
      margin: 0 0 16px;
      font-size: 1.3rem;
      color: var(--primary);
      text-align: center;
    }
    .modal label {
      display: block;
      margin: 14px 0 5px;
      font-size: 0.95rem;
      color: #555;
      font-weight: 500;
    }
    .modal input, .modal textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      background: #fafafa;
    }
    .modal textarea {
      resize: vertical;
      min-height: 80px;
    }
    .modal-buttons {
      margin-top: 24px;
      display: flex;
      gap: 10px;
    }
    .modal-buttons button {
      flex: 1;
      padding: 13px 16px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 50px;
      border: none;
      cursor: pointer;
    }
    .cancel-btn { background: #e91e63; color: white; }
    .delete-btn { background: #ff5722; color: white; }
    .save-btn { background: #e91e63; color: white; }

    a.link {
      color: #1e88e5;
      text-decoration: underline;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- App Header -->
    <div class="app-header">
      <div onclick="history.back()" style="cursor:pointer;">←</div>
      <h1>我的旅行行程</h1>
      <div style="font-size:1.4rem;">❔ ✏️ 🔗</div>
    </div>

    <!-- Upload -->
    <div class="upload">
      <input type="file" id="fileInput" accept=".xlsx,.csv" style="display:none;">
      <button onclick="document.getElementById('fileInput').click()">📤 上傳 Excel / CSV</button>
      <button onclick="loadSampleData()">📋 載入馬來西亞 5 天範例</button>
      <button onclick="exportCSV()">📥 匯出 CSV</button>
      <button onclick="window.print()">📄 列印 / 匯出 PDF</button>
      <button onclick="clearData()" style="background:#f44336;">🗑️ 清除所有資料</button>
    </div>

    <!-- Day Tabs -->
    <div id="dayTabs" class="day-tabs"></div>

    <!-- Timeline -->
    <div id="timelineContainer" class="timeline-container"></div>
  </div>

  <!-- 編輯 Modal（已大幅縮小） -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2>✏️ 編輯行程</h2>
      
      <label>日期</label>
      <input type="text" id="edit-date" placeholder="2026/04/05 (Day 1)">

      <label>時間</label>
      <input type="text" id="edit-time" placeholder="09:30">

      <label>地點</label>
      <input type="text" id="edit-location" placeholder="吉隆坡國際機場">

      <label>營業時間</label>
      <input type="text" id="edit-hours" placeholder="全天">

      <label>費用 ($$)</label>
      <input type="text" id="edit-cost" placeholder="RM 0">

      <label>交通方式</label>
      <input type="text" id="edit-transport" placeholder="Grab">

      <label>重點 / 備註</label>
      <textarea id="edit-note" rows="3" placeholder="重點描述或連結"></textarea>

      <div class="modal-buttons">
        <button onclick="hideModal()" class="cancel-btn">取消</button>
        <button onclick="deleteCurrentEvent()" class="delete-btn">🗑️ 刪除</button>
        <button onclick="saveEdit()" class="save-btn">💾 儲存</button>
      </div>
    </div>
  </div>

  <script>
    let trips = [];
    let currentEditIndex = -1;

    function formatTime(val) {
      if (!val) return '';
      if (typeof val === 'number') {
        const hours = Math.floor(val * 24);
        const minutes = Math.round((val * 24 - hours) * 60);
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
      }
      return String(val).trim();
    }

    function makeLink(text) {
      if (!text) return '';
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, match => 
        `<a href="${match}" target="_blank" class="link">🔗 點擊開啟連結</a>`
      );
    }

    function extractCost(val) {
      if (!val) return 0;
      const str = String(val).toUpperCase().replace(/RM| |\$/g, '').trim();
      const matches = str.match(/\d+\.?\d*/g);
      if (!matches) return 0;
      const nums = matches.map(Number);
      return nums.length === 1 ? nums[0] : (nums[0] + nums[nums.length-1]) / 2;
    }

    function getTransportMode(transport) {
      const t = (transport || '').toLowerCase();
      if (t.includes('grab') || t.includes('車') || t.includes('taxi')) return '🚕';
      if (t.includes('mrt') || t.includes('ets') || t.includes('bus') || t.includes('渡輪')) return '🚇';
      return '🚶';
    }

    // ==================== 檔案上傳 ====================
    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          if (file.name.endsWith('.xlsx')) {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            let raw = XLSX.utils.sheet_to_json(sheet);
            let currentDate = '';
            raw.forEach(row => {
              if (row['日期'] && String(row['日期']).trim() !== '') currentDate = String(row['日期']).trim();
              else if (currentDate) row['日期'] = currentDate;
            });
            trips = raw.filter(r => r['時間'] || r['地點']);
          } else {
            trips = parseCSV(ev.target.result);
          }
          localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
          renderAll();
        } catch(err) {
          alert('讀取失敗，請確認檔案格式');
        }
      };
      reader.readAsArrayBuffer ? reader.readAsArrayBuffer(file) : reader.readAsText(file);
    });

    function parseCSV(csv) {
      const lines = csv.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const obj = {};
        headers.forEach((h,i) => obj[h] = (values[i] || '').replace(/^"|"$/g,'').trim());
        return obj;
      });
    }

    // ==================== Modal 控制 ====================
    function showEditModal(index) {
      currentEditIndex = index;
      const item = trips[index];
      document.getElementById('edit-date').value = item['日期'] || '';
      document.getElementById('edit-time').value = item['時間'] || '';
      document.getElementById('edit-location').value = item['地點'] || '';
      document.getElementById('edit-hours').value = item['營業時間'] || '';
      document.getElementById('edit-cost').value = item['$$'] || '';
      document.getElementById('edit-transport').value = item['交通'] || '';
      document.getElementById('edit-note').value = item['重點'] || '';
      document.getElementById('editModal').style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    function saveEdit() {
      if (currentEditIndex === -1) return;
      trips[currentEditIndex] = {
        ...trips[currentEditIndex],
        '日期': document.getElementById('edit-date').value,
        '時間': document.getElementById('edit-time').value,
        '地點': document.getElementById('edit-location').value,
        '營業時間': document.getElementById('edit-hours').value,
        '$$': document.getElementById('edit-cost').value,
        '交通': document.getElementById('edit-transport').value,
        '重點': document.getElementById('edit-note').value
      };
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
      hideModal();
      renderAll();
    }

    function deleteCurrentEvent() {
      if (currentEditIndex === -1) return;
      if (confirm('確定要刪除這個行程嗎？')) {
        trips.splice(currentEditIndex, 1);
        localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
        hideModal();
        renderAll();
      }
    }

    // ==================== 渲染 ====================
    function renderAll() {
      renderDayTabs();
      renderTimeline();
    }

    function renderDayTabs() {
      const tabsContainer = document.getElementById('dayTabs');
      tabsContainer.innerHTML = '';
      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });

      Object.keys(grouped).sort().forEach(date => {
        const dayId = 'day-' + date.replace(/[^a-zA-Z0-9]/g, '');
        const tab = document.createElement('div');
        tab.className = 'day-tab';
        tab.textContent = date;
        tab.dataset.dayId = dayId;
        tab.onclick = () => {
          document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const target = document.getElementById(dayId);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        tabsContainer.appendChild(tab);
      });
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = '';

      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });

      let globalIdx = 0;

      Object.keys(grouped).sort().forEach(date => {
        const dayTrips = grouped[date];
        const dayTotal = dayTrips.reduce((sum, r) => sum + extractCost(r['$$']), 0);
        const dayId = 'day-' + date.replace(/[^a-zA-Z0-9]/g, '');

        let html = `
          <div class="day-section" id="${dayId}">
            <div class="day-header">
              ${date}
              <span class="day-total">小計 RM ${dayTotal.toFixed(0)}</span>
            </div>
            <button class="add-event-btn" onclick="addNewEvent('${date}')">＋ 新增此天活動</button>`;

        dayTrips.forEach(r => {
          const costNum = extractCost(r['$$']);
          const currentLoc = r['地點'] || '';
          const modeIcon = getTransportMode(r['交通']);
          const encodedCurrent = encodeURIComponent(currentLoc);
          const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodedCurrent}`;

          html += `
            <div class="event">
              <div class="time-dot">
                <div class="time">${formatTime(r['時間'])}</div>
                <div class="dot">${globalIdx + 1}</div>
              </div>
              <div class="event-card">
                <span onclick="showEditModal(${globalIdx})" class="edit-icon">✏️</span>
                <h3>${currentLoc}</h3>
                <small>
                  營業時間：${r['營業時間'] || '—'}<br>
                  費用：${r['$$'] || '—'} （計算 RM ${costNum.toFixed(0)}）<br>
                  重點：${makeLink(r['重點'] || '')}
                </small>
                <div class="transport">
                  ${modeIcon} ${r['交通'] || '—'}
                </div>
                <button class="nav-btn" onclick="window.open('${mapUrl}','_blank')">🗺️ 導航到此地點</button>
              </div>
            </div>`;
          globalIdx++;
        });

        html += `</div>`;
        container.innerHTML += html;
      });
    }

    // ==================== 新增活動 ====================
    function addNewEvent(defaultDate) {
      const newEvent = {
        '日期': defaultDate,
        '時間': '10:00',
        '地點': '新地點',
        '營業時間': '全天',
        '$$': 'RM 0',
        '交通': 'Walking',
        '重點': ''
      };
      trips.push(newEvent);
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
      renderAll();
      showEditModal(trips.length - 1);
    }

    // ==================== 其他功能 ====================
    function exportCSV() {
      if (trips.length === 0) return alert('沒有資料');
      let csv = '日期,時間,地點,營業時間,$$,交通,重點\n';
      trips.forEach(r => {
        csv += `"${r['日期']||''}","${r['時間']||''}","${r['地點']||''}","${r['營業時間']||''}","${r['$$']||''}","${r['交通']||''}","${r['重點']||''}"\n`;
      });
      const blob = new Blob([csv], {type:'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'My-Trip.csv';
      a.click();
    }

    function clearData() {
      if (confirm('確定清除所有資料？')) {
        localStorage.removeItem('malaysiaTrips');
        trips = [];
        renderAll();
      }
    }

    function loadSampleData() {
      trips = [
        {"日期":"2026/04/05 (Day 1)","時間":"09:30","地點":"吉隆坡國際機場 (KLIA)","營業時間":"全天","$$":"RM 0","交通":"KLIA Ekspres","重點":"抵達馬來西亞"},
        {"日期":"2026/04/05 (Day 1)","時間":"11:00","地點":"Bukit Bintang 酒店區","營業時間":"全天","$$":"RM 180","交通":"Grab","重點":"Check-in + 午餐"},
        {"日期":"2026/04/05 (Day 1)","時間":"14:00","地點":"中央市場 (Pasar Seni)","營業時間":"10:00-22:00","$$":"RM 45","交通":"Walking","重點":"手工藝品"},
        {"日期":"2026/04/05 (Day 1)","時間":"18:30","地點":"Jalan Alor 美食街","營業時間":"17:00-00:00","$$":"RM 85","交通":"Grab","重點":"街頭美食"}
      ];
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
      renderAll();
      alert("✅ 已載入範例！\n\n現在點擊卡片右上角 ✏️ 即可編輯～");
    }

    window.onload = () => {
      const saved = localStorage.getItem('malaysiaTrips');
      if (saved) {
        trips = JSON.parse(saved);
      }
      renderAll();
    };
  </script>
</body>
</html>
