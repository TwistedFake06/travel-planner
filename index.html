<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e88e5">
  <title>我的旅行行程</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #1e88e5;
      --accent: #42a5f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      background: linear-gradient(135deg, #1e88e5, #1565c0);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      flex-shrink: 0;
      z-index: 20;
    }
    .app-header h1 { margin:0; font-size:1.25rem; font-weight:600; }

    .scrollable-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #f8fbff;
      position: relative;
    }

    .upload {
      padding: 16px;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    button {
      border: none;
      border-radius: 50px;
      padding: 14px 20px;
      font-size: 1.02rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, #1e88e5, #42a5f5); }
    .btn-danger  { background: linear-gradient(135deg, #ef5350, #e53935); }

    /* === 日期 Tab 永遠置頂 === */
    .day-tabs {
      display: flex;
      overflow-x: auto;
      background: white;
      padding: 12px 8px;
      gap: 8px;
      border-bottom: 1px solid #eee;
      scrollbar-width: none;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 15;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .day-tab {
      flex: 0 0 auto;
      padding: 10px 20px;
      background: #f5f5f5;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .day-tab.active {
      background: var(--primary);
      color: white;
    }

    .timeline-container {
      padding: 20px 16px 40px;
      position: relative;
    }

    .timeline-container::before {
      content: '';
      position: absolute;
      left: 47px;
      top: 30px;
      bottom: 20px;
      width: 4px;
      background: linear-gradient(#1e88e5, #42a5f5);
      z-index: 1;
    }

    .day-section {
      margin-bottom: 48px;
    }

    .day-header {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      padding-left: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .day-total {
      font-size: 0.95rem;
      font-weight: 500;
      color: #555;
      background: #e3f2fd;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .event {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      position: relative;
      z-index: 2;
    }

    .time-column {
      width: 94px;
      flex-shrink: 0;
      text-align: center;
      position: relative;
    }

    .time {
      font-size: 0.9rem;
      font-weight: 700;
      color: #1e88e5;
      background: white;
      padding: 2px 8px;
      border-radius: 12px;
      display: inline-block;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      min-width: 78px;
    }

    .dot {
      width: 46px;
      height: 46px;
      background: white;
      border: 5px solid var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary);
      margin: 8px auto 0;
      box-shadow: 0 4px 12px rgba(30,136,229,0.35);
      position: relative;
      z-index: 3;
    }

    .event-card {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      position: relative;
      min-height: 140px;
    }

    .event-card h3 {
      margin: 0 0 10px 0;
      font-size: 1.22rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .event-card .meta {
      font-size: 0.92rem;
      color: #555;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .transport {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f7ff;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.88rem;
      margin-bottom: 12px;
    }

    .nav-btn {
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 13px;
      font-weight: 600;
      font-size: 1rem;
      width: 100%;
      cursor: pointer;
    }

    .edit-icon {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 1.4rem;
      color: #aaa;
      cursor: pointer;
      z-index: 4;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      width: 92%;
      max-width: 380px;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { margin: 0 0 18px; color: var(--primary); text-align: center; }
    .modal label { display: block; margin: 14px 0 5px; color: #555; }
    .modal input, .modal textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
    }
    .modal-buttons { margin-top: 24px; display: flex; gap: 10px; }
    .modal-buttons button {
      flex: 1;
      padding: 13px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 50px;
      border: none;
    }
    .cancel-btn { background: #9e9e9e; color: white; }
    .delete-btn { background: #ef5350; color: white; }
    .save-btn { background: var(--primary); color: white; }
  </style>
</head>
<body>

  <div class="app-header">
    <div onclick="history.back()" style="cursor:pointer;">←</div>
    <h1>我的旅行行程</h1>
    <div style="font-size:1.4rem;">❔ ✏️ 🔗</div>
  </div>

  <div class="scrollable-content">
    <div class="upload">
      <input type="file" id="fileInput" accept=".xlsx,.csv,.json" style="display:none;">
      <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📤 上傳 Excel / CSV / JSON</button>
      <button class="btn-danger" onclick="clearData()">🗑️ 清除所有資料</button>
    </div>

    <div id="dayTabs" class="day-tabs"></div>
    <div id="timelineContainer" class="timeline-container"></div>
  </div>

  <!-- 編輯 Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2>✏️ 編輯行程</h2>
      <label>日期</label><input type="text" id="edit-date">
      <label>時間</label><input type="text" id="edit-time">
      <label>地點</label><input type="text" id="edit-location">
      <label>營業時間</label><input type="text" id="edit-hours">
      <label>費用 ($$)</label><input type="text" id="edit-cost">
      <label>交通方式</label><input type="text" id="edit-transport">
      <label>重點 / 備註</label><textarea id="edit-note" rows="3"></textarea>
      <div class="modal-buttons">
        <button onclick="hideModal()" class="cancel-btn">取消</button>
        <button onclick="deleteCurrentEvent()" class="delete-btn">🗑️ 刪除</button>
        <button onclick="saveEdit()" class="save-btn">💾 儲存</button>
      </div>
    </div>
  </div>

  <script>
    let trips = [];
    let currentEditIndex = -1;

    function formatTime(val) {
      if (!val) return '';
      if (typeof val === 'number') {
        const hours = Math.floor(val * 24);
        const minutes = Math.round((val * 24 - hours) * 60);
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
      }
      return String(val).trim();
    }

    function makeLink(text) {
      if (!text) return '';
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, match => `<a href="${match}" target="_blank" class="link">🔗 點擊開啟連結</a>`);
    }

    function extractCost(val) {
      if (!val) return 0;
      const str = String(val).toUpperCase().replace(/RM| |\$|,/g, '').trim();
      const matches = str.match(/\d+\.?\d*/g);
      if (!matches) return 0;
      const nums = matches.map(Number);
      return nums.length === 1 ? nums[0] : (nums[0] + nums[nums.length-1]) / 2;
    }

    function getTransportMode(transport) {
      const t = (transport || '').toLowerCase();
      if (t.includes('grab') || t.includes('車') || t.includes('taxi')) return 'driving';
      if (t.includes('mrt') || t.includes('ets') || t.includes('bus') || t.includes('渡輪')) return 'transit';
      return 'walking';
    }

    // 檔案上傳處理
    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      const filename = file.name.toLowerCase();

      reader.onload = ev => {
        try {
          let tripsData = [];
          if (filename.endsWith('.xlsx')) {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const raw = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '', blankrows: false });
            tripsData = convertExcelToObjects(raw);
          } else if (filename.endsWith('.csv')) {
            tripsData = parseCSV(ev.target.result);
          } else if (filename.endsWith('.json')) {
            const jsonContent = JSON.parse(ev.target.result);
            if (!Array.isArray(jsonContent)) throw new Error("JSON 必須是一個陣列");
            tripsData = jsonContent;
          } else {
            throw new Error("不支援的檔案格式");
          }

          trips = tripsData.filter(r => (r['時間'] || r['地點'] || r['日期'] || '').toString().trim() !== '');

          localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
          renderAll();
          alert(`✅ 匯入成功！\n共 ${trips.length} 筆行程`);
        } catch(err) {
          alert('❌ 讀取失敗：\n' + err.message);
        }
      };

      filename.endsWith('.xlsx') ? reader.readAsArrayBuffer(file) : reader.readAsText(file);
    });

    function convertExcelToObjects(rows) {
      if (rows.length < 2) return [];
      const headers = rows[0].map(h => String(h || '').trim());
      const dataRows = rows.slice(1);
      const result = [];
      let currentDate = '';
      for (let row of dataRows) {
        const obj = {};
        let hasContent = false;
        headers.forEach((header, i) => {
          let key = header;
          if (/日期|date/i.test(header)) key = '日期';
          else if (/時間|time/i.test(header)) key = '時間';
          else if (/地點|location|place/i.test(header)) key = '地點';
          else if (/營業時間|hours|open/i.test(header)) key = '營業時間';
          else if (/費用|cost|price|\$\$|rm/i.test(header)) key = '$$';
          else if (/交通|transport/i.test(header)) key = '交通';
          else if (/重點|note|備註/i.test(header)) key = '重點';
          let value = row[i] == null ? '' : String(row[i]).trim();
          obj[key] = value;
          if (key === '日期' && value) currentDate = value;
          if (value) hasContent = true;
        });
        if (currentDate && !obj['日期']) obj['日期'] = currentDate;
        if (hasContent) result.push(obj);
      }
      return result;
    }

    function parseCSV(csv) {
      const lines = csv.trim().split('\n');
      if (lines.length === 0) return [];
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/^"|"$/g, ''));
        const obj = {};
        headers.forEach((h, idx) => obj[h] = values[idx] || '');
        result.push(obj);
      }
      return result;
    }

    function renderAll() {
      renderDayTabs();
      renderTimeline();
    }

    function renderDayTabs() {
      const container = document.getElementById('dayTabs');
      container.innerHTML = '';
      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });
      Object.keys(grouped).sort().forEach(date => {
        const dayId = 'day-' + date.replace(/[^a-zA-Z0-9]/g, '');
        const tab = document.createElement('div');
        tab.className = 'day-tab';
        tab.textContent = date;
        tab.dataset.dayId = dayId;
        tab.onclick = () => {
          document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(dayId)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        container.appendChild(tab);
      });
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = '';
      
      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });

      let prevLoc = '';
      let globalIdx = 0;

      Object.keys(grouped).sort().forEach(date => {
        const dayTrips = grouped[date];
        const dayTotal = dayTrips.reduce((sum, r) => sum + extractCost(r['$$']), 0);
        const dayId = 'day-' + date.replace(/[^a-zA-Z0-9]/g, '');

        let html = `
          <div class="day-section" id="${dayId}">
            <div class="day-header">
              ${date}
              <span class="day-total">小計 RM ${dayTotal.toFixed(0)}</span>
            </div>`;

        dayTrips.forEach(r => {
          const costNum = extractCost(r['$$']);
          const currentLoc = r['地點'] || '';
          const mode = getTransportMode(r['交通']);

          let mapUrl = prevLoc 
            ? `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(prevLoc)}&destination=${encodeURIComponent(currentLoc)}&travelmode=${mode}`
            : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentLoc)}`;

          const timeDisplay = formatTime(r['時間']) || '全天';

          html += `
            <div class="event">
              <div class="time-column">
                <div class="time">${timeDisplay}</div>
                <div class="dot">${globalIdx + 1}</div>
              </div>
              <div class="event-card">
                <span onclick="showEditModal(${globalIdx})" class="edit-icon">✏️</span>
                <h3>${currentLoc}</h3>
                <div class="meta">
                  營業時間：${r['營業時間'] || '—'}<br>
                  費用：${r['$$'] || '—'} （計算 RM ${costNum.toFixed(0)}）<br>
                  重點：${makeLink(r['重點'] || '')}
                </div>
                <div class="transport">
                  ${mode === 'driving' ? '🚕' : mode === 'transit' ? '🚇' : '🚶'} ${r['交通'] || '—'}
                </div>
                <button class="nav-btn" onclick="window.open('${mapUrl}','_blank')">
                  📍 從上一個地點導航
                </button>
              </div>
            </div>`;
          prevLoc = currentLoc;
          globalIdx++;
        });

        html += `</div>`;
        container.innerHTML += html;
      });
    }

    function showEditModal(index) {
      currentEditIndex = index;
      const item = trips[index];
      document.getElementById('edit-date').value = item['日期'] || '';
      document.getElementById('edit-time').value = item['時間'] || '';
      document.getElementById('edit-location').value = item['地點'] || '';
      document.getElementById('edit-hours').value = item['營業時間'] || '';
      document.getElementById('edit-cost').value = item['$$'] || '';
      document.getElementById('edit-transport').value = item['交通'] || '';
      document.getElementById('edit-note').value = item['重點'] || '';
      document.getElementById('editModal').style.display = 'flex';
    }

    function hideModal() { 
      document.getElementById('editModal').style.display = 'none'; 
    }

    function saveEdit() {
      if (currentEditIndex === -1) return;
      trips[currentEditIndex] = {
        ...trips[currentEditIndex],
        '日期': document.getElementById('edit-date').value,
        '時間': document.getElementById('edit-time').value,
        '地點': document.getElementById('edit-location').value,
        '營業時間': document.getElementById('edit-hours').value,
        '$$': document.getElementById('edit-cost').value,
        '交通': document.getElementById('edit-transport').value,
        '重點': document.getElementById('edit-note').value
      };
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
      hideModal();
      renderAll();
    }

    function deleteCurrentEvent() {
      if (currentEditIndex === -1) return;
      if (confirm('確定要刪除這個行程嗎？')) {
        trips.splice(currentEditIndex, 1);
        localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
        hideModal();
        renderAll();
      }
    }

    function clearData() {
      if (confirm('確定清除所有資料？')) {
        localStorage.removeItem('malaysiaTrips');
        trips = [];
        renderAll();
      }
    }

    window.onload = () => {
      const saved = localStorage.getItem('malaysiaTrips');
      if (saved) trips = JSON.parse(saved);
      renderAll();
    };
  </script>
</body>
</html>
